<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Smart IoT System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="flex items-center justify-center min-h-screen bg-slate-50">

    <div class="clean-card p-10 w-full max-w-md mx-4 animate-fade-in my-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800 mb-2">Create Account</h1>
            <p class="text-slate-500 text-sm">Join the Smart IoT Monitoring platform</p>
        </div>

        <form id="register-form" class="space-y-5">
            <div>
                <label class="block text-slate-700 text-sm font-semibold mb-2">Full Name</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-regular fa-user"></i>
                    </div>
                    <input type="text" id="name" required class="clean-input pl-10" placeholder="John Doe">
                </div>
            </div>

            <div>
                <label class="block text-slate-700 text-sm font-semibold mb-2">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-regular fa-envelope"></i>
                    </div>
                    <input type="email" id="email" required class="clean-input pl-10" placeholder="you@example.com">
                </div>
            </div>

            <div>
                <label class="block text-slate-700 text-sm font-semibold mb-2">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <input type="password" id="password" required class="clean-input pl-10" placeholder="••••••••">
                </div>
            </div>

            <div>
                <label class="block text-slate-700 text-sm font-semibold mb-2">Confirm Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-solid fa-check-double"></i>
                    </div>
                    <input type="password" id="confirm-password" required class="clean-input pl-10" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="register-btn" class="clean-btn w-full mt-4 h-12 text-base">
                Create Account
            </button>
        </form>

        <div class="mt-8 text-center border-t border-slate-100 pt-6">
            <p class="text-slate-500 text-sm">
                Already have an account? 
                <a href="login.html" class="text-blue-500 hover:text-blue-700 font-semibold transition">Sign in</a>
            </p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
