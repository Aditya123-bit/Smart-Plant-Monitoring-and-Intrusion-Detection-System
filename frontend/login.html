<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart IoT System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="flex items-center justify-center min-h-screen bg-slate-50">

    <div class="clean-card p-10 w-full max-w-md mx-4 animate-fade-in">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fa-solid fa-leaf"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 mb-2">Welcome Back</h1>
            <p class="text-slate-500 text-sm">Sign in to your IoT dashboard</p>
        </div>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-slate-700 text-sm font-semibold mb-2">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-regular fa-envelope"></i>
                    </div>
                    <input type="email" id="email" required class="clean-input pl-10" placeholder="you@example.com" value="admin@gmail.com">
                </div>
            </div>

            <div>
                <label class="block text-slate-700 text-sm font-semibold mb-2">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <input type="password" id="password" required class="clean-input pl-10 pr-16" placeholder="••••••••" value="password123">
                    <button type="button" id="toggle-pwd" class="absolute inset-y-0 right-0 pr-3 flex items-center text-sm text-blue-500 hover:text-blue-700 font-medium">Show</button>
                </div>
            </div>

            <button type="submit" id="login-btn" class="clean-btn w-full mt-2 h-12 text-base">
                Sign In
            </button>
        </form>

        <div class="mt-8 text-center border-t border-slate-100 pt-6">
            <p class="text-slate-500 text-sm">
                Don't have an account? 
                <a href="register.html" class="text-blue-500 hover:text-blue-700 font-semibold transition">Create one</a>
            </p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
